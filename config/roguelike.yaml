# 冒险岛肉鸽自动化配置
# 说明：所有坐标基于模拟器屏幕分辨率，需要根据实际情况调整

# ==================== 设备配置 ====================
device:
  id: "emulator-5560"          # ADB 设备 ID
  adb_path: "adb"              # ADB 路径，如有多个 ADB 可指定完整路径
  screenshot_interval: 0.1     # 截图间隔（秒）

# ==================== 小地图配置 ====================
# 小地图位于屏幕右上角，通过 HSV 颜色检测玩家、怪物、NPC
minimap:
  # 小地图区域坐标（左上角和右下角）
  x1: 900
  y1: 20
  x2: 1260
  y2: 180

  # 颜色检测范围 (HSV 格式：[H, S, V])
  colors:
    # 玩家 - 黄色圆点
    player:
      lower: [20, 150, 150]
      upper: [35, 255, 255]

    # 怪物 - 红色三角（红色在 HSV 中有两个范围）
    monster:
      lower1: [0, 150, 150]    # 红色低端
      upper1: [15, 255, 255]
      lower2: [160, 150, 150]  # 红色高端
      upper2: [180, 255, 255]

    # NPC - 绿色菱形
    npc:
      lower: [50, 150, 150]
      upper: [70, 255, 255]

    # 传送门 - 蓝色圆圈（下一关入口）
    portal:
      lower: [100, 150, 150]
      upper: [130, 255, 255]

  # 检测阈值
  thresholds:
    player_min: 20      # 玩家最小面积
    player_max: 500     # 玩家最大面积
    monster_min: 15     # 怪物最小面积
    monster_max: 1000   # 怪物最大面积
    npc_min: 15         # NPC 最小面积
    npc_max: 500        # NPC 最大面积
    portal_min: 20      # 传送门最小面积
    portal_max: 800     # 传送门最大面积

# ==================== 技能配置 ====================
# 技能按钮位于屏幕下方，通过颜色饱和度检测是否解锁
skill:
  # 技能按钮中心坐标（6 个技能，2 行 3 列）
  positions:
    - [950, 550]   # 技能 1
    - [1050, 550]  # 技能 2
    - [1150, 550]  # 技能 3
    - [950, 650]   # 技能 4
    - [1050, 650]  # 技能 5
    - [1150, 650]  # 技能 6

  # 跳跃按钮位置
  jump: [1200, 630]

  # 检测参数
  button_radius: 50       # 技能按钮半径（像素）
  color_threshold: 0.15   # 颜色阈值，低于此值认为是未解锁（灰色加号）

# ==================== 战斗配置 ====================
# 战斗控制器负责攻击、移动、跳跃等操作
combat:
  # 冷却时间（秒）
  attack_interval: 0.3    # 攻击间隔
  move_interval: 0.1      # 移动间隔
  jump_cooldown: 0.6      # 跳跃冷却

  # 躲避配置
  dodge_threshold: 0.3    # 血量低于 30% 开始躲避（暂未实现血量检测）

  # 虚拟摇杆位置（用于移动）
  joystick: [200, 550]

  # 跳跃按钮位置
  jump_pos: [1200, 630]

  # 技能位置（与 skill.positions 保持一致）
  skill_positions:
    - [950, 550]
    - [1050, 550]
    - [1150, 550]
    - [950, 650]
    - [1050, 650]
    - [1150, 650]

# ==================== 导航配置 ====================
# 导航器负责寻路、探索、防卡死
navigation:
  # 移动参数
  move_interval: 0.1      # 移动间隔（秒）
  explore_duration: 2.0   # 探索持续时间（秒）

  # 防卡死
  stuck_threshold: 5      # 连续 5 次位置未变认为卡住

  # 虚拟摇杆位置
  joystick: [200, 550]

  # 跳跃按钮位置
  jump: [1200, 630]

# ==================== 游戏逻辑配置 ====================
# 控制状态机行为
game:
  # 到达阈值（像素）
  arrive_threshold: 20.0        # 到达目标判断阈值
  portal_arrive_threshold: 30.0 # 到达传送门判断阈值

  # 方向键位置（用于进入传送门）
  # 需要根据实际游戏界面调整
  up_key_position: [540, 400]

  # 超时设置（秒）
  npc_find_timeout: 10.0        # 寻找 NPC 超时
  max_combat_duration: 30.0     # 最大战斗时长
  idle_timeout: 5.0             # 空闲状态超时
  portal_timeout: 15.0          # 寻找传送门超时

  # 距离阈值
  attack_range: 100             # 攻击范围（像素）
  npc_interact_range: 50        # NPC 交互范围（像素）
